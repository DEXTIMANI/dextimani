<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dextimani - Web & App Services</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body,html{
  margin:0;padding:0;height:100%;
  background:#0f0f0f;
  font-family:'Segoe UI',sans-serif;
  color:white;
  text-align:center;
  overflow-x:hidden
}

/* Head */
header{padding:40px 20px}
.brand-name{font-size:1.2rem;font-weight:bold;color:#7ed957}
h1{font-size:2.2rem;color:#7ed957;margin:10px 0;font-weight:800;text-transform:uppercase}
.subtitle{color:#d1f1ff;font-size:1rem;margin-bottom:20px}

/* Category Titles */
.section-title{
  font-size:1.8rem;
  margin-top:40px;
  font-weight:800;
  color:#7ed957;
}

.section-desc{
  color:#d1f1ff;
  padding:0 30px;
  font-size:.9rem;
  margin-bottom:15px;
}

/* Carousel */
.carousel{
  display:flex;
  gap:15px;
  overflow-x:auto;
  padding:15px;
  scroll-snap-type:x mandatory;
  scrollbar-width:none
}
.carousel::-webkit-scrollbar{display:none}

.card{
  flex:0 0 75%;
  max-width:280px;
  height:180px;
  background:#1b1b1b;
  border:1px solid #2e2e2e;
  border-radius:12px;
  overflow:hidden;
  scroll-snap-align:center;
  position:relative;
}

.card img{
  width:100%;height:100%;object-fit:cover;
  opacity:0.85;
}

.card-label{
  position:absolute;
  bottom:8px;left:8px;
  background:#7ed957;
  color:black;
  padding:4px 10px;
  font-size:.7rem;
  border-radius:4px;
}

/* Buttons */
.order-btn{
  margin-top:10px;
  background:#7ed957;
  border:none;
  color:black;
  padding:10px 30px;
  font-size:1rem;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}
.order-btn:hover{filter:brightness(1.1)}

/* Modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;overflow:auto}
.modal-box{
  background:#111;
  color:#7ed957;
  max-width:420px;
  margin:40px auto;
  padding:25px;
  border-radius:15px;
  border:2px solid #7ed957;
  text-align:left
}
.modal-box label{display:block;margin-top:10px}
.modal-box input,.modal-box select,.modal-box textarea{
  width:100%;padding:8px;margin-top:5px;
  background:#222;color:#7ed957;
  border:1px solid #7ed957;border-radius:4px
}
.modal-box button{
  margin-top:15px;
  padding:10px 20px;
  background:#7ed957;color:black;
  border:none;cursor:pointer;font-weight:bold
}
.modal-box button:hover{background:#a4ff7a}
#countdown{color:#7ed957;margin-top:10px;font-size:.9rem}
</style>
</head>

<body>

<header>
  <div class="brand-name">DEXTIMANI DIGITAL SERVICES</div>
  <h1>Web & App Solutions</h1>
  <div class="subtitle">Order Websites, Mobile Apps, UI/UX and Custom Software Development</div>
</header>

<script>
const sections = [
  {
    title:"Website Development",
    desc:"Professional websites for businesses, schools, churches, institutions, and portfolios.",
    cat:"webdev",
    items:["Landing Pages","School Websites","Business Websites","E-commerce","Portfolio Websites"],
    images:["https://via.placeholder.com/400x250?text=Landing+Page","https://via.placeholder.com/400x250?text=Ecommerce","https://via.placeholder.com/400x250?text=Business+Site"]
  },
  {
    title:"Mobile App Development",
    desc:"Android, iOS and cross-platform mobile apps to serve your users.",
    cat:"mobile",
    items:["Android Apps","iOS Apps","Cross-Platform","Flutter","React Native"],
    images:["https://via.placeholder.com/400x250?text=Android+App","https://via.placeholder.com/400x250?text=Flutter+App"]
  },
  {
    title:"UI/UX Design",
    desc:"Modern user interface and user experience design for digital products.",
    cat:"uiux",
    items:["Web UI","App UI","Wireframes","Prototyping","Dashboard Design"],
    images:["https://via.placeholder.com/400x250?text=UI+Design","https://via.placeholder.com/400x250?text=Prototyping"]
  },
  {
    title:"Custom Software",
    desc:"Tailored applications for automation, business operations, fintech, and more.",
    cat:"software",
    items:["Automation Tools","Desktop Apps","Enterprise Software","Databases","Custom API"],
    images:["https://via.placeholder.com/400x250?text=Software","https://via.placeholder.com/400x250?text=Enterprise"]
  }
];

sections.forEach(s=>{
  document.write(`
    <div class="section-title">${s.title}</div>
    <div class="section-desc">${s.desc}</div>
    <div id="${s.cat}" class="carousel"></div>
    <button class="order-btn" onclick="openModal('${s.cat}')">Request ${s.title}</button>
  `);
});

window.onload=function(){
  sections.forEach(s=>{
    const container=document.getElementById(s.cat);
    s.images.forEach(img=>{
      container.innerHTML+=`
        <div class="card">
          <img src="${img}">
          <span class="card-label">Sample</span>
        </div>`
    });
  });
};

</script>

<!-- MODAL -->
<div id="orderModal" class="modal">
  <div class="modal-box">
    <h2 id="modalTitle">Request Service</h2>
    <form id="orderForm">
      <label>Name:</label><input type="text" id="clientName" required>
      <label>Business / Organization:</label><input type="text" id="clientBiz">
      <label>Project Type:</label><select id="projectType"></select>
      <label>Project Description:</label><textarea id="projectDesc" rows="3"></textarea>
      <label>Budget (₦):</label><input type="number" id="budget" placeholder="Optional">
      <label>Deadline:</label><input type="date" id="deadline">
      <button type="submit">Download PDF & Send</button>
      <button type="button" onclick="closeModal()">Cancel</button>
      <div id="countdown"></div>
    </form>
  </div>
</div>

<script>
const modal=document.getElementById('orderModal');
const projectType=document.getElementById('projectType');

function openModal(cat){
  projectType.innerHTML="";
  const section=sections.find(s=>s.cat===cat);
  section.items.forEach(opt=>projectType.innerHTML+=`<option>${opt}</option>`);
  document.getElementById('modalTitle').innerText=`Request ${section.title}`;
  modal.style.display="block";
}

function closeModal(){
  modal.style.display="none";
  document.getElementById('orderForm').reset();
  document.getElementById('countdown').textContent="";
}

document.getElementById('orderForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const name=document.getElementById('clientName').value;
  const biz=document.getElementById('clientBiz').value;
  const type=projectType.value;
  const desc=document.getElementById('projectDesc').value;
  const budget=document.getElementById('budget').value;
  const deadline=document.getElementById('deadline').value;

  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF();
  pdf.text("Project Request",20,20);
  pdf.text(`Name: ${name}`,20,30);
  pdf.text(`Business: ${biz}`,20,40);
  pdf.text(`Project: ${type}`,20,50);
  pdf.text(`Budget: ₦${budget}`,20,60);
  pdf.text(`Deadline: ${deadline}`,20,70);
  pdf.text(`Description: ${desc}`,20,85);
  pdf.save("project_request.pdf");

  let t=5;
  const cd=document.getElementById('countdown');
  cd.textContent=`Sending to WhatsApp in ${t}s...`;

  const timer=setInterval(()=>{
    t--;
    if(t>0){cd.textContent=`Sending to WhatsApp in ${t}s...`;return;}
    clearInterval(timer);
    const phone="2349133671148";
    const msg=`New Project Request:
Name: ${name}
Business: ${biz}
Project: ${type}
Budget: ₦${budget}
Deadline: ${deadline}
Description: ${desc}`;
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank');
    closeModal();
  },1000);
});
</script>

</body>
</html>
